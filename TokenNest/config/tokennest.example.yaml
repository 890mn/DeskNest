# TokenNest 主配置示例
# 复制为 tokennest.yaml 后按需修改。
# 所有字段都可以通过 .env 里的 TN_* 环境变量覆盖（优先级 .env > yaml > 默认）。

server:
  host: 0.0.0.0          # 监听地址；只本机用改成 127.0.0.1
  port: 8787             # 端口（避开 8765，gesture dashboard 在用）

poll:
  chatgptIntervalSec: 60
  minimaxIntervalSec: 60
  requestTimeoutSec: 15

paths:
  cacheDir: ./cache
  codexAuthFile: ~/.codex/auth.json
  minimaxConfig: ./config/minimax.json

staleThresholdSec: 300    # 5 分钟；任一源超过此时间未更新视为 stale

; DeskNest - platformio.ini
; 栖于桌面，息于常亮之间

[platformio]
default_envs = DeskNest
src_dir = .

[env:DeskNest]
platform = https://github.com/DFRobot/platform-unihiker.git
board = unihiker_k10
framework = arduino
monitor_speed = 115200
; src_dir=. 会让 PIO 扫到 test/，把它编进固件。这里排除掉
build_src_filter = +<*> -<.git/> -<.pio/> -<.vscode/> -<test/> -<scripts/> -<docs/>

; Build flags
build_flags =
    -I src
    -I include
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBOARD_REV=1
    ; DESKNEST_VERSION 默认走 src/config.h；这里不在 -D 注入字符串，
    ; 否则 shell/PIO 解析时会拆掉引号变成裸 0.1.0。

; Library dependencies
; - unihiker_k10.h comes from framework-arduinounihiker (no extra dep)
; - ArduinoJson for status.json parsing (P1)
lib_deps =

; Upload / monitor
upload_speed = 921600

; ---------------------------------------------------------------------------
; Host smoke test — native + Unity
; 校准 src/gesture.cpp 三轴手势识别（plan §4.2）：
;   旋转 / 翻面 / 摇动 / Tap 的滞回、冷却、阈值是否与设计一致。
; 运行：pio test -e desknest_test
; ---------------------------------------------------------------------------
[env:desknest_test]
platform = native
test_framework = unity
build_flags =
    -I test/stubs          ; 优先匹配 stub Arduino.h，避开 framework-arduino*
    -I src
    -I include
    -std=c++17
    -mconsole              ; 编译期也加：避免 gcc 误判 CRT 头文件
extra_scripts = pre:scripts/mingw_console.py
; 不烧入 K10；不拉 src/ 里其它需要真硬件的 .cpp
test_build_src = false

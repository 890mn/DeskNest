; DeskNest - platformio.ini
; 栖屏 DeskNest — 共享构建配置（入库）
;
; 个人凭证（WiFi SSID/密码、TokenNest URL）请编辑 platformio.local.ini,
; 不要写在这里。第一次跑 pio run 时,scripts/pio_local_config.py 钩子
; 会自动从 platformio.local.ini.example 复制并提示你填入。
;
; local.ini 的 [secrets] section 不会被 PIO 当 build 配置解析
; (已不引用 extra_configs),仅由 pre-script 生成 include/generated/secrets.h,
; 再用 -include 强制在所有 TU 之前包含 —— C 字符串字面量完全在源码层面,
; 绕过 shell/SCons/gcc 任何一层的空格/@ 等特殊字符 tokenization。

[platformio]
default_envs = DeskNest
src_dir = .

; ---------------------------------------------------------------------------
; 共享的 [env:DeskNest] 段
; ---------------------------------------------------------------------------
; 不可变项（platform / board / framework 等）放这里。
; 个人凭证（SSID / PASS / URL）在 scripts/pio_local_config.py 钩子里
; 从 platformio.local.ini 的 [secrets] 段读出，生成
; include/generated/secrets.h，再通过 -include 注入所有编译单元。
; 不走 build_flags 字符串，绕开 shell 对空格的 tokenization。
[env:DeskNest]
platform = https://github.com/DFRobot/platform-unihiker.git
board = unihiker_k10
framework = arduino
monitor_speed = 115200
; src_dir=. 会让 PIO 扫到 test/，把它编进固件。这里排除掉
build_src_filter = +<*> -<.git/> -<.pio/> -<.vscode/> -<test/> -<scripts/> -<docs/> -<pc-simulator/>

; Build flags（共享部分 —— 不含个人凭证）
build_flags =
    -I src
    -I include
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBOARD_REV=1
    ; DESKNEST_VERSION 默认走 src/config.h；这里不在 -D 注入字符串,
    ; 否则 shell/PIO 解析时会拆掉引号变成裸 1.0。
    ; DESKNEST_WIFI_SSID / _PASS / DESKNEST_TOKENNEST_STATUS_URL
    ; WiFi、TokenNest URL 由
    ; scripts/pio_local_config.py 读 platformio.local.ini
    ; 的 [secrets] section,生成 include/generated/secrets.h,
    ; 再通过 -include 注入 —— C 字符串字面量直接写入源文件,空格/@ 等字符安全。
extra_scripts =
    pre:scripts/cnfontnest_pio.py
    pre:scripts/pio_local_config.py

; Library dependencies
; - unihiker_k10.h comes from framework-arduinounihiker (no extra dep)
; - status.json uses the repository's bounded parser; no extra JSON library
lib_deps =

; Upload / monitor
upload_speed = 921600

; ---------------------------------------------------------------------------
; Firmware pure-logic host tests — native + Unity
; 覆盖状态机、按键/手势、AI/what2eat 解析、设置、页面注册与 UiModel。
; 运行：pio test -e desknest_test
; ---------------------------------------------------------------------------
[env:desknest_test]
platform = native
test_framework = unity
build_flags =
    -I test/stubs          ; 优先匹配 stub Arduino.h，避开 framework-arduino*
    -I src
    -I include
    -std=c++17
    -mconsole              ; 编译期也加：避免 gcc 误判 CRT 头文件
extra_scripts = pre:scripts/mingw_console.py
; 不烧入 K10；不拉 src/ 里其它需要真硬件的 .cpp
test_build_src = false
